{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Gratitudes</h2>
  <a href="{% url 'gratitude_create' %}" class="btn btn-primary mb-3">Add Gratitude</a>
  <div class="list-group">
    {% for item in gratitude_list %}
      <a href="{{ item.get_absolute_url }}" class="list-group-item list-group-item-action">
        <h5>From: {{ item.author.username }}</h5>
        <p>{{ item.gratitude_text|truncatewords:20 }}</p>
        <small class="text-muted">{{ item.created_date|date:"F j, Y, g:i a" }}</small>
      </a>
    {% empty %}
      <p>No gratitudes found.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
