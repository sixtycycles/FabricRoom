<form id="image-upload-form-input" enctype="multipart/form-data" class="mb-3">
  <div class="input-group input-group-sm">
    <input type="file" class="form-control" id="image-file-input" name="image" accept="image/*" required>
    <button class="btn btn-outline-secondary" type="submit">Upload</button>
    <button class="btn btn-outline-secondary" type="button" id="image-cancel">Cancel</button>
  </div>
  <small class="text-muted d-block mt-1">Max file size: 10MB. Formats: JPG, PNG, GIF, WebP</small>
</form>
